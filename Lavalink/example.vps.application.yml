server:
  port: 3333
  address: 0.0.0.0
lavalink:
  server:
    password: "takeshi"
    sources:
      youtube: false # Native YouTube phải bị tắt (false) để dùng plugin
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    bufferDurationMs: 225
    frameBufferDurationMs: 5000
    youtubePlaylistLoadLimit: 3
    playerUpdateInterval: 3
    requestTimeout: 60000
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true
    
    # Cấu hình IPv6 Route Planner (Bypass dải IP)
    routePlanner:
      client: nanoIpRoutePlanner # Tùy chọn: rotatingNanoIpRoutePlanner, nanoIpRoutePlanner...
      ipBlock: "[IP_ADDRESS]" # VD: "2a02:c206:2111:1111::/64"
      handleAllRequests: true

  plugins:
    # Chỉ giữ lại YouTube plugin bản mới nhất (1.18.0)
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      repository: "https://maven.lavalink.dev/releases"
    
    # Thêm LavaSrc để lấy metadata nhạc từ Spotify/AppleMusic
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      repository: "https://maven.lavalink.dev/releases"

plugins:
  # ==========================================
  # CAU HINH CHO LAVASRC (SPOTIFY/APPLE MUSIC)
  # ==========================================
  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
    sources:
      spotify: true    # Bật tính năng Spotify
      applemusic: true # Bật tính năng AppleMusic
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: false
    spotify:
      clientId: ""
      clientSecret: ""
      countryCode: "VN"
      playlistLoadLimit: 6
      albumLoadLimit: 6

  # ==========================================
  # CAU HINH CHO YOUTUBE (CHONG IP-BAN)
  # ==========================================
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    
    # Cấu hình Remote Cipher (Bạn cần chạy yt-cipher ở port 8001)
    remoteCipher:
      url: "http://localhost:8001"
      password: "test"
      userAgent: "discord-musicbot-lavalink"

    # Cấu hình OAuth2
    oauth:
      enabled: true
      refreshToken: ""

    # Cấu hình Clients (Dựa theo Changelog bản 1.18.0)
    clients:
      - "MUSIC"
      - "ANDROID_VR"
      - "WEB"
      - "WEBEMBEDDED"
      - "TVHTML5_SIMPLY" # Thay thế TVHTML5EMBEDDED đã bị khai tử

    # Tinh chỉnh hành vi của từng Client
    WEB:
      playback: true
      videoLoading: true
      searching: true
    MUSIC:
      playback: false
      videoLoading: false
      searching: true
    TVHTML5_SIMPLY:
      playback: true
      videoLoading: false
      searching: false

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    max-history: 5
    max-size: 10MB
  path: ./logs/
  level:
    root: INFO
    lavalink: INFO
    # Yêu cầu quan trọng: Để INFO cho Oauth2Handler để nó in mã code ra Console
    dev.lavalink.youtube.http.YoutubeOauth2Handler: INFO
  request:
    enabled: true
    includeClientInfo: true
    includeHeaders: true
    includeQueryString: true
    includePayload: true
    maxPayloadLength: 10000