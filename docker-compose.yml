services:
  discordmusicbot:
    container_name: discordmusicbot
    build: .
    image: discordmusicbot:local
    network_mode: host
    restart: always
    volumes:
      - ./config.js:/usr/src/app/config.js:ro
      - ./commands:/usr/src/app/commands
      - ./lib:/usr/src/app/lib
      - ./events:/usr/src/app/events
      - ./util:/usr/src/app/util
      - ./api:/usr/src/app/api
      - ./index.js:/usr/src/app/index.js
      - ./data:/usr/src/app/data

  caddy:
    image: caddy:2-alpine
    container_name: musicbot-api-caddy
    restart: always
    depends_on:
      - discordmusicbot
    ports:
      - "8075:80"
      - "8443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
