services:
  # --------------------------------
  # Lavalink (Audio node)
  # --------------------------------
  lavalink:
    container_name: discordmusicbot-lavalink
    image: ghcr.io/lavalink-devs/lavalink:latest
    restart: unless-stopped
    environment:
      - _JAVA_OPTIONS=-Xmx2G
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=youshallnotpass
      - LAVALINK_SERVER_SOURCES_YOUTUBE=false
    volumes:
      - ./Lavalink/application.yml:/opt/Lavalink/application.yml
      - ./Lavalink/plugins/:/opt/Lavalink/plugins/
    networks:
      - discordmusicbot-net
    ports:
      - "2333:2333"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -H 'Authorization: youshallnotpass' http://localhost:2333/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --------------------------------
  # Discord-MusicBot
  # --------------------------------
  discordmusicbot:
    container_name: discordmusicbot
    build: .
    image: discordmusicbot:local
    restart: always
    volumes:
      - ./config.js:/usr/src/app/config.js:ro
    depends_on:
      lavalink:
        condition: service_healthy
    networks:
      - discordmusicbot-net

networks:
  discordmusicbot-net:
    name: discordmusicbot-net
